<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funnel Estética Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f1f5f9; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 700px; background: white; padding-bottom: 20px; }
        .header { background: #0f172a; color: #ffffff; padding: 30px 20px; text-align: center; border-bottom: 4px solid #d4af37; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 300; letter-spacing: 1px; text-transform: uppercase; }
        .header p { margin: 5px 0 0 0; font-size: 14px; color: #d4af37; letter-spacing: 2px; }
        
        .swiper { width: 100%; background: #ffffff; padding: 10px 10px 30px 10px; }
        .swiper-slide { display: flex; flex-direction: column; align-items: center; min-height: 320px; }
        .swiper-slide img { width: 100%; max-height: 250px; object-fit: contain; }
        .slide-desc { font-size: 15px; color: #d4af37; margin-top: 15px; font-weight: 600; text-align: center; padding: 0 15px; }
        
        .faq-section { padding: 15px; margin-top: 20px; }
        .accordion { background: #0f172a; color: white; padding: 15px; width: 100%; border: none; text-align: left; border-radius: 8px; margin-bottom: 8px; font-weight: bold; }
        .panel { padding: 0 15px; background-color: #f8fafc; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; border-left: 3px solid #d4af37; margin-bottom: 8px; }
        
        .btn-container { padding: 15px; }
        .btn-wa { display: block; background: #0fb396; color: white; padding: 18px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: 700; font-size: 18px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h1 id="nombre-visual">Cargando...</h1>
        <p id="subtitulo-visual">Cargando...</p>
    </div>
    
    <div class="swiper main-swiper">
        <div class="swiper-wrapper">
            <!-- 8 Slides generados por ID (f1 al f8) -->
            <div class="swiper-slide"><img id="f1" src=""><p id="desc1" class="slide-desc"></p></div>
            <div class="swiper-slide"><img id="f2" src=""><p id="desc2" class="slide-desc"></p></div>
            <div class="swiper-slide"><img id="f3" src=""><p id="desc3" class="slide-desc"></p></div>
            <div class="swiper-slide"><img id="f4" src=""><p id="desc4" class="slide-desc"></p></div>
            <div class="swiper-slide"><img id="f5" src=""><p id="desc5" class="slide-desc"></p></div>
            <div class="swiper-slide"><img id="f6" src=""><p id="desc6" class="slide-desc"></p></div>
            <div class="swiper-slide"><img id="f7" src=""><p id="desc7" class="slide-desc"></p></div>
            <div class="swiper-slide"><img id="f8" src=""><p id="desc8" class="slide-desc"></p></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="faq-section">
        <button class="accordion">...</button><div class="panel"><p></p></div>
        <button class="accordion">...</button><div class="panel"><p></p></div>
    </div>

    <div class="btn-container">
        <a id="btn-wa" href="#" class="btn-wa">💬 Consultar por WhatsApp</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    new Swiper('.main-swiper', { loop: true, autoplay: { delay: 3500 }, pagination: { el: '.swiper-pagination' } });

    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSU-bpcGNEsdx8LCiX7kkz4hVmn1AY0MoqjiXA4saZ9QYdKhCuzeN5qramsCIvYIpjMrM5nmaSvxg8V/pub?gid=0&single=true&output=csv';

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const res = await fetch(SHEET_URL);
        const data = await res.text();
        const rows = data.split('\n').map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
        
        const user = rows.find(r => r[0] && r[0].toLowerCase() === id.toLowerCase());
        if (user) {
            document.getElementById('nombre-visual').innerText = user[1];
            document.getElementById('subtitulo-visual').innerText = user[2];
            document.getElementById('btn-wa').href = 'https://wa.me/' + user[3];
            
            // Carga los 8 bloques (5 historia + 3 testimonios) correlativos
            for(let i=0; i<8; i++) {
                let fotoCol = 4 + (i * 2);
                let descCol = 5 + (i * 2);
                if(document.getElementById('f'+(i+1))) document.getElementById('f'+(i+1)).src = user[fotoCol] || "";
                if(document.getElementById('desc'+(i+1))) document.getElementById('desc'+(i+1)).innerText = user[descCol] || "";
            }
            // Acordeones (comienzan tras las 16 columnas anteriores, índice 20)
            document.querySelectorAll('.accordion').forEach((acc, index) => {
                let tCol = 20 + (index * 2); let cCol = 21 + (index * 2);
                if (user[tCol]) acc.innerHTML = user[tCol];
                let panel = acc.nextElementSibling;
                if (panel && user[cCol]) panel.querySelector('p').innerText = user[cCol];
            });
        }
    }
    init();
</script>
</body>
</html>
