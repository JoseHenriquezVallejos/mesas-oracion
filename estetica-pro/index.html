<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const swiperInstance = new Swiper('.main-swiper', { loop: true, autoplay: { delay: 3500 }, pagination: { el: '.swiper-pagination' } });

    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4K0WrpNMABKiNO2BOx3QZOOMo2Nui81vWBq15ocGym7WC8D6hvVEmj7KNRACuRmxe48qxx1JZgzlo/pub?gid=0&single=true&output=csv';

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        
        if (!id) {
            document.getElementById('nombre-visual').innerText = "Acceso no disponible";
            document.getElementById('subtitulo-visual').innerText = "";
            document.querySelector('.main-swiper').style.display = 'none';
            document.querySelector('.faq-section').style.display = 'none';
            document.getElementById('btn-wa').style.display = 'none';
            return;
        }

        const res = await fetch(SHEET_URL);
        const data = await res.text();
        const rows = data.split('\n').map(row => {
            const result = []; let cell = ''; let inQuotes = false;
            for (let char of row) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { result.push(cell); cell = ''; }
                else cell += char;
            }
            result.push(cell);
            return result;
        });

        // Limpiamos el ID buscado eliminando espacios y caracteres invisibles de salto de línea (\r)
        const cleanId = id.replace(/[\r\n]+/g, "").trim();

        const user = rows.find(r => r[0] && r[0].replace(/[\r\n]+/g, "").trim() === cleanId);

        if (user) {
            document.getElementById('nombre-visual').innerText = user[1] ? user[1].trim() : "";
            document.getElementById('subtitulo-visual').innerText = user[2] ? user[2].trim() : "";
            document.getElementById('btn-wa').href = user[3] ? user[3].trim() : "#";
            
            for(let i=0; i<8; i++) {
                let fotoCol = 5 + (i * 2);
                let descCol = 6 + (i * 2);
                if(document.getElementById('f'+(i+1))) document.getElementById('f'+(i+1)).src = user[fotoCol] ? user[fotoCol].trim() : "";
                if(document.getElementById('desc'+(i+1))) document.getElementById('desc'+(i+1)).innerText = user[descCol] ? user[descCol].trim() : "";
            }

            document.querySelectorAll('.accordion').forEach((acc, index) => {
                let tCol = 21 + (index * 2); let cCol = 22 + (index * 2);
                if (user[tCol]) acc.innerHTML = user[tCol].trim();
                let panel = acc.nextElementSibling;
                if (panel && user[cCol]) panel.querySelector('p').innerText = user[cCol].trim();
            });
        } else {
            // Si no encuentra el ID o ya fue removido de la planilla
            document.getElementById('nombre-visual').innerText = "Acceso no disponible";
            document.getElementById('subtitulo-visual').innerText = "";
            document.querySelector('.main-swiper').style.display = 'none';
            document.querySelector('.faq-section').style.display = 'none';
            document.getElementById('btn-wa').style.display = 'none';
        }
    }
    init();

    document.querySelectorAll('.accordion').forEach(acc => {
        acc.addEventListener('click', function() {
            this.classList.toggle("active");
            var panel = this.nextElementSibling;
            panel.style.maxHeight = panel.style.maxHeight ? null : panel.scrollHeight + "px";
        });
    });
</script>
