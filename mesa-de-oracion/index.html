<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Oración</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; max-width: 600px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .accordion-item { background: #1e293b; margin-bottom: 10px; border-radius: 8px; overflow: hidden; }
        .accordion-header { width: 100%; padding: 15px; background: #334155; color: white; border: none; text-align: left; font-size: 18px; cursor: pointer; }
        .accordion-content { padding: 15px; display: none; background: #1e293b; }
        audio { width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div class="header">
    <h1 id="nombre-visual">Cargando...</h1>
    <p>Mesa de Oración</p>
</div>

<div id="accordion-container">
    </div>

<script>
    // CAMBIA ESTO POR TU URL DE PLANILLA CON &output=csv
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGa4eqew0ZuG7AI1ZPZyo27jWSj9drWXH8JTvOxVqOtl5U-1YSa0ozV4gk5wk9nj6zvOjdnp8pKAms/pub?gid=0&single=true&output=csv';

    async function cargarDatos() {
        const res = await fetch(SHEET_URL);
        const data = await res.text();
        const rows = data.split('\n');
        const user = rows[1].split(','); // Asumimos fila 2 para el usuario

        document.getElementById('nombre-visual').innerText = user[1];

        const titulos = ["Salud", "Familia", "Trabajo", "Finanzas", "Paz Mental", "Sabiduría", "Propósito"];
        const emojis = ["❤️", "🏠", "💼", "💰", "🕊️", "🧠", "🎯"];
        
        const container = document.getElementById('accordion-container');
        
        for(let i=0; i<7; i++) {
            container.innerHTML += `
                <div class="accordion-item">
                    <button class="accordion-header" onclick="toggle(this)">${emojis[i]} ${titulos[i]}</button>
                    <div class="accordion-content">
                        <p>Repite esta oración con FE...</p>
                        <audio controls>
                            <source src="${user[8+i]}" type="audio/mpeg">
                        </audio>
                    </div>
                </div>
            `;
        }
    }

    function toggle(btn) {
        const content = btn.nextElementSibling;
        content.style.display = (content.style.display === "block") ? "none" : "block";
    }

    cargarDatos();
</script>
</body>
</html>
