<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa de Oración</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 600px; background: white; padding-bottom: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); min-height: 100vh; }
        
        .header { background: #0f172a; color: #ffffff; padding: 40px 20px; text-align: center; border-bottom: 4px solid #d4af37; }
        .header h1 { margin: 0; font-size: 26px; font-weight: 700; text-transform: uppercase; }
        .header p { margin: 8px 0 0 0; font-size: 14px; color: #d4af37; letter-spacing: 3px; font-weight: bold; }
        
        .swiper { width: 100%; height: 300px; padding: 20px 0; }
        .swiper-slide img { width: 90%; height: 100%; object-fit: cover; border-radius: 12px; margin: auto; display: block; }
        
        .accordion-container { padding: 20px; }
        .accordion-item { margin-bottom: 12px; border-radius: 8px; overflow: hidden; border: 2px solid #0f172a; }
        
        /* Botones ahora con menos altura (padding vertical reducido) */
        .accordion-header { 
            width: 100%; padding: 15px 20px; background: #0f172a; color: white; border: none; 
            text-align: left; font-size: 18px; font-weight: bold; cursor: pointer; 
            display: flex; align-items: center;
        }
        
        .accordion-content { 
            padding: 20px; display: none; background: #0f172a; 
            font-size: 17px; line-height: 1.6; color: #ffffff; text-align: justify;
        }
        
        .btn-container { padding: 20px; text-align: center; }
        .btn-wa { display: inline-block; background: linear-gradient(135deg, #25d366, #128c7e); color: white; padding: 18px 30px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 17px; box-shadow: 0 6px 15px rgba(37, 211, 102, 0.4); }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h1 id="nombre-visual">Cargando...</h1>
        <p>MESA DE ORACIÓN</p>
    </div>
    
    <div class="swiper main-swiper">
        <div class="swiper-wrapper" id="swiper-content"></div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="accordion-container" id="accordion-container"></div>

    <div class="btn-container">
        <a id="btn-wa" href="#" class="btn-wa">🙏 Enviar Petición de Oración</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const baseOracion = "<strong>Repite esta oración con FE:</strong><br><br>";
    
    const oraciones = [
        { t: "❤️ Salud", c: baseOracion + "Padre Celestial, hoy me acerco a ti reconociendo tu poder sanador sobre mi vida. Pongo mi salud en tus manos, confiando en que tú eres mi médico por excelencia. Te pido que restaures cada célula, cada órgano y cada pensamiento en mi cuerpo. Llena mi vida de fortaleza, calma mi ansiedad y devuélveme el bienestar que necesito para servirte y vivir plenamente. Gracias por escucharme y por obrar en mi salud según tu voluntad perfecta. En el nombre de Jesús, Amén." },
        { t: "👪 Familia", c: baseOracion + "Padre Celestial, pongo a mi familia en tus manos hoy. Te pido que traigas paz, amor y unidad a nuestro hogar. Bendice cada vínculo entre nosotros, sana cualquier herida y permite que tu sabiduría guíe nuestras decisiones diarias. Te ruego que seas el centro de nuestra convivencia, protegiéndonos de toda discordia y fortaleciéndonos para caminar juntos en armonía bajo tu gracia. Gracias por el regalo de mi familia. En el nombre de Jesús, Amén." },
        { t: "💼 Trabajo", c: baseOracion + "Padre Celestial, te presento mi trabajo y mis labores diarias. Te pido que seas tú quien guíe mis manos y mis decisiones, otorgándome la sabiduría y la diligencia necesarias para realizar mis tareas con excelencia. Bendice mis proyectos, abre puertas de oportunidad y permite que mi esfuerzo sea de provecho y bendición para otros. Que en cada desafío laboral pueda ver tu mano proveyendo y fortaleciéndome. Gracias por la capacidad de trabajar y por el sustento que me brindas. En el nombre de Jesús, Amén." },
        { t: "➕ Fe y ánimo", c: baseOracion + "Padre Celestial, en momentos de incertidumbre, me refugio en ti. Te pido que fortalezcas mi corazón y renueves mi esperanza hoy. Cuando me sienta débil, sé tú mi fortaleza; cuando la duda intente entrar en mi mente, rodéame con tu paz que sobrepasa todo entendimiento. Ayúdame a caminar con fe, confiando en tus promesas y recordando siempre que no estoy solo, pues tú vas conmigo. Gracias por renovar mi espíritu y darme el ánimo para seguir adelante bajo tu luz. En el nombre de Jesús, Amén." },
        { t: "🙏 Agradecimiento", c: baseOracion + "Padre Celestial, vengo ante ti con un corazón lleno de gratitud. Gracias por el regalo de la vida, por tu amor inagotable y por cada bendición, grande o pequeña, que has derramado sobre mí y los míos. Reconozco que todo lo bueno proviene de ti y te agradezco por tu guía, tu protección y por sostener mi mano en cada paso del camino. Que mi vida sea un reflejo constante de este agradecimiento y que mi espíritu siempre reconozca tu bondad. En el nombre de Jesús, Amén." },
        { t: "📜 Petición especial", c: baseOracion + "Padre Celestial, hoy vengo ante ti con esta petición que pesa en mi corazón y que solo tú conoces profundamente. Te la presento con total confianza, sabiendo que tú escuchas cada ruego y que tu voluntad es perfecta y buena para mi vida. Te pido, Señor, que intervengas en esta situación, guiando cada paso, abriendo las puertas necesarias y concediéndome la paz y la sabiduría para esperar en tus tiempos. Pongo esta carga en tus manos y descanso en tu amor, creyendo en tu respuesta. En el nombre de Jesús, Amén." }
    ];

    const accContainer = document.getElementById('accordion-container');
    oraciones.forEach(item => {
        accContainer.innerHTML += `
            <div class="accordion-item">
                <button class="accordion-header" onclick="this.nextElementSibling.style.display=(this.nextElementSibling.style.display==='block'?'none':'block')">
                    ${item.t}
                </button>
                <div class="accordion-content">${item.c}</div>
            </div>
        `;
    });

    // Configuración con autoplay activo
    const swiper = new Swiper('.main-swiper', { 
        loop: true, 
        autoplay: { delay: 3000, disableOnInteraction: false }, 
        pagination: { el: '.swiper-pagination' } 
    });

    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGa4eqew0ZuG7AI1ZPZyo27jWSj9drWXH8JTvOxVqOtl5U-1YSa0ozV4gk5wk9nj6zvOjdnp8pKAms/pub?gid=0&single=true&output=csv';

    async function init() {
        try {
            const res = await fetch(SHEET_URL);
            const data = await res.text();
            const rows = data.split('\n').map(r => r.split(','));
            const user = rows[1];
            if (user) {
                document.getElementById('nombre-visual').innerText = user[1].trim();
                document.getElementById('btn-wa').href = 'https://wa.me/' + user[2].trim();
                const swiperWrapper = document.getElementById('swiper-content');
                for(let i=0; i<5; i++) {
                    if(user[3+i] && user[3+i].trim() !== "") {
                        swiperWrapper.innerHTML += `<div class="swiper-slide"><img src="${user[3+i].trim()}"></div>`;
                    }
                }
                swiper.update();
            }
        } catch (e) { console.error("Error al cargar:", e); }
    }
    init();
</script>
</body>
</html>
