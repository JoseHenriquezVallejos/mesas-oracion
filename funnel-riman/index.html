<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>Atención Riman</title>
    <style>
        :root { --header-bg: #0f172a; --btn-green: #0fb396; --btn-gold: #d4af37; }
        body { font-family: sans-serif; background: #f1f5f9; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 500px; background: white; height: 100%; display: flex; flex-direction: column; }
        .header { background: var(--header-bg); color: white; padding: 20px; text-align: center; }
        #chat-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 10px; max-width: 85%; }
        .bot-msg { background: #f1f5f9; align-self: flex-start; }
        .button-area { padding: 20px; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid #e2e8f0; }
        .btn-action { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; color: white; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h1 id="user-name">Hola</h1>
        <p>¿En qué puedo ayudarte hoy?</p>
    </div>
    <div id="chat-history">
        <div class="msg bot-msg">¡Hola! Soy tu asistente virtual de Riman. Estoy aquí para resolver tus dudas sobre nuestros productos o el modelo de negocio.</div>
    </div>
    <div class="button-area" id="actions">
        <!-- Los botones se generarán aquí -->
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id') || 'cliente';
    document.getElementById('user-name').innerText = "Riman - " + id.charAt(0).toUpperCase() + id.slice(1);

    // Datos por ID
    const db = {
        "josehenriquez": { whatsapp: "56945491173", tienda: "https://mall.riman.com/ais21/products" }
    };
    const info = db[id] || { whatsapp: "56945491173", tienda: "#" };

    const actions = [
        { text: "🛍️ Ver catálogo", href: info.tienda, color: "#d4af37" },
        { text: "💬 Hablar con un asesor", href: `https://wa.me/${info.whatsapp}`, color: "#0fb396" }
    ];

    const area = document.getElementById('actions');
    actions.forEach(a => {
        const btn = document.createElement('a');
        btn.innerText = a.text;
        btn.href = a.href;
        btn.target = "_blank";
        btn.className = "btn-action";
        btn.style.backgroundColor = a.color;
        area.appendChild(btn);
    });
</script>
</body>
</html>
