<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Funnel Riman</title>
    <!-- Incluimos los estilos de Swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        .swiper { width: 100%; height: 400px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <!-- 1. Carrusel de imágenes (Primero) -->
    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="1.jpg"></div>
            <div class="swiper-slide"><img src="2.jpg"></div>
            <div class="swiper-slide"><img src="3.jpg"></div>
            <div class="swiper-slide"><img src="4.jpg"></div>
            <div class="swiper-slide"><img src="5.jpg"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <!-- 2. Tus botones (Debajo del carrusel) -->
    <div class="botones">
        <!-- Aquí va tu código de botones actual -->
    </div>

    <!-- 3. Botón de WhatsApp (Chat para consultas) -->
    <a href="https://wa.me/TU_NUMERO_AQUI" style="position:fixed; bottom:20px; right:20px; z-index:1000;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="60" alt="Chat con nosotros">
    </a>

    <!-- Scripts de Swiper -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            loop: true,
            autoplay: {
                delay: 3000,
                disableOnInteraction: false,
            },
            pagination: {
                el: '.swiper-pagination',
            },
        });
    </script>
</body>
</html>
