<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funnel Pro</title>
    <!-- Aquí irían tus links a Swiper.js y CSS -->
</head>
<body>

    <!-- 1. CABECERA -->
    <header>
        <h1 id="nombre-visual"></h1>
        <p id="subtitulo-visual"></p>
    </header>

    <!-- 2. CARRUSEL PRINCIPAL (8 Slides: 5 Historia + 3 Testimonios) -->
    <div class="swiper-container">
        <div class="swiper-wrapper">
            <!-- Historia -->
            <div class="swiper-slide"><img id="f1" src=""><p id="desc1"></p></div>
            <div class="swiper-slide"><img id="f2" src=""><p id="desc2"></p></div>
            <div class="swiper-slide"><img id="f3" src=""><p id="desc3"></p></div>
            <div class="swiper-slide"><img id="f4" src=""><p id="desc4"></p></div>
            <div class="swiper-slide"><img id="f5" src=""><p id="desc5"></p></div>
            <!-- Testimonios -->
            <div class="swiper-slide"><img id="f6" src=""><p id="desc6"></p></div>
            <div class="swiper-slide"><img id="f7" src=""><p id="desc7"></p></div>
            <div class="swiper-slide"><img id="f8" src=""><p id="desc8"></p></div>
        </div>
    </div>

    <!-- 3. BOTONES DE ACCIÓN -->
    <div class="actions">
        <a id="btn-wa" href="#">WhatsApp</a>
        <a id="btn-tienda" href="#">Agendar / Comprar</a>
    </div>

    <!-- 4. ACORDEONES (Preguntas frecuentes) -->
    <section class="faq">
        <div class="accordion-item">
            <button class="accordion"></button>
            <div class="panel"><p></p></div>
        </div>
        <div class="accordion-item">
            <button class="accordion"></button>
            <div class="panel"><p></p></div>
        </div>
        <div class="accordion-item">
            <button class="accordion"></button>
            <div class="panel"><p></p></div>
        </div>
    </section>

    <!-- 5. SCRIPT DE LÓGICA -->
    <script>
        function cargarDatos(user) {
            
            // --- CARGA DE TEXTOS ---
            document.getElementById('nombre-visual').innerText = user[1] ? user[1].trim() : "";
            document.getElementById('subtitulo-visual').innerText = user[2] ? user[2].trim() : "";
            
            // --- CARGA DE BOTONES ---
            document.getElementById('btn-wa').href = 'https://wa.me/' + (user[3] ? user[3].trim() : "");
            document.getElementById('btn-tienda').href = user[4] ? user[4].trim() : "";

            // --- CARGA DE CARRUSEL (8 SLIDES) ---
            // Recorremos del 1 al 8 para llenar f1-f8 y desc1-desc8
            for(let i = 0; i < 8; i++) {
                let fotoCol = 5 + (i * 2); 
                let descCol = 6 + (i * 2);
                
                let slideImg = document.getElementById('f' + (i + 1));
                let slideDesc = document.getElementById('desc' + (i + 1));
                
                if(slideImg) slideImg.src = user[fotoCol] ? user[fotoCol].trim() : "";
                if(slideDesc) slideDesc.innerText = user[descCol] ? user[descCol].trim() : "";
            }

            // --- CARGA DE ACORDEONES ---
            // Comienzan en la columna V (índice 21)
            const acordeones = document.querySelectorAll('.accordion');
            acordeones.forEach((acc, index) => {
                let titleCol = 21 + (index * 2);
                let contentCol = 22 + (index * 2);
                
                if (user[titleCol] && user[titleCol].trim() !== "") {
                    acc.innerHTML = user[titleCol].trim();
                    acc.parentElement.style.display = 'block';
                    let panel = acc.nextElementSibling;
                    if (panel && user[contentCol]) {
                        panel.querySelector('p').innerText = user[contentCol].trim();
                    }
                } else {
                    acc.parentElement.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
