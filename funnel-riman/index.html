<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funnel Riman Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #f1f5f9; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 700px; background: white; padding-bottom: 20px; }
        
        .header { background: #0f172a; color: #ffffff; padding: 30px 20px; text-align: center; border-bottom: 4px solid #d4af37; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 300; letter-spacing: 1px; text-transform: uppercase; }
        .header p { margin: 5px 0 0 0; font-size: 14px; color: #d4af37; letter-spacing: 2px; }
        
        .swiper { width: 100%; height: 300px; background: #ffffff; padding: 10px; box-sizing: border-box; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: contain; display: block; }
        
        .test-swiper { height: 350px !important; background: #f8fafc; margin-top: 30px; border-top: 1px solid #e2e8f0; }
        .test-swiper .swiper-slide img { padding: 20px; box-sizing: border-box; object-fit: contain; }
        
        .section-title { padding: 30px 15px 10px 15px; font-weight: bold; color: #1e293b; font-size: 18px; }
        
        .faq-section { padding: 15px; }
        
        .accordion { 
            background: #0f172a; 
            color: #ffffff; 
            cursor: pointer; 
            padding: 18px; 
            width: 100%; 
            border: none; 
            text-align: left; 
            border-radius: 8px; 
            margin-bottom: 10px; 
            font-weight: 700; 
            font-size: 17px; 
            transition: 0.4s; 
        }
        .accordion:hover { background: #1e293b; }
        
        .panel { 
            padding: 15px 18px; /* Padding ajustado para mejor equilibrio */
            background-color: #f8fafc; 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.3s ease-out; 
            border-left: 4px solid #0f172a; 
            margin-bottom: 10px;
            font-size: 17px; 
            color: #0f172a; 
            line-height: 1.6;
            font-weight: 500;
            text-align: justify; /* AQUÍ ESTÁ EL AJUSTE PARA CUADRAR EL TEXTO */
        }
        
        .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .btn-action { background: #334155; color: white; padding: 15px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: 600; font-size: 15px; }
        .btn-gold { background: #d4af37; }
        .btn-green { background: #0fb396; }
        .btn-diamond { background: #2563eb; grid-column: span 2; font-size: 17px; padding: 15px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h1 id="nombre-visual">Cargando...</h1>
        <p>RIMAN PLANNER</p>
    </div>
    
    <div class="swiper main-swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="" id="f1"></div>
            <div class="swiper-slide"><img src="" id="f2"></div>
            <div class="swiper-slide"><img src="" id="f3"></div>
            <div class="swiper-slide"><img src="" id="f4"></div>
            <div class="swiper-slide"><img src="" id="f5"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="section-title">Resultados Reales</div>
    <div class="swiper test-swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="" id="t1"></div>
            <div class="swiper-slide"><img src="" id="t2"></div>
            <div class="swiper-slide"><img src="" id="t3"></div>
            <div class="swiper-slide"><img src="" id="t4"></div>
            <div class="swiper-slide"><img src="" id="t5"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="faq-section" id="faq-container"></div>

    <div class="button-grid">
        <a id="btn-tienda" href="#" class="btn-action btn-gold">🛍️ Ver Tienda</a>
        <a id="btn-wa" href="#" class="btn-action btn-green">💬 WhatsApp</a>
        <a id="btn-planner" href="#" class="btn-action btn-diamond">¡Quiero ser Planner! 💎</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    new Swiper('.main-swiper', { loop: true, autoplay: { delay: 3000 }, pagination: { el: '.swiper-pagination' } });
    new Swiper('.test-swiper', { loop: true, pagination: { el: '.swiper-pagination' } });

    const infoRiman = [
        { t: "✨ ¿Qué es Riman?", c: "Riman es la marca #1 de belleza coreana que fusiona ingredientes botánicos con ciencia patentada para transformar tu piel desde el nivel celular." },
        { t: "🔬 Tecnología de Absorción", c: "Nuestros productos utilizan sistemas avanzados de entrega para que los activos penetren profundamente, logrando resultados reales y duraderos." },
        { t: "🌿 Líneas de Cuidado", c: "Contamos con: Incellderm (facial), Botalab (capilar y corporal) y Lifening (nutrición), cubriendo todas tus necesidades de belleza." },
        { t: "💧 Ingredientes Exclusivos", c: "Utilizamos activos únicos de la isla de Jeju y complejos botánicos ricos en antioxidantes que protegen tu piel del envejecimiento visible." },
        { t: "🤝 Nuestra Comunidad", c: "Como tu Planner, te guiaré paso a paso para que aproveches al máximo la tecnología Riman y transformes tu rutina de cuidado personal." }
    ];

    const faqContainer = document.getElementById('faq-container');
    infoRiman.forEach(item => {
        faqContainer.innerHTML += `
            <button class="accordion">${item.t}</button>
            <div class="panel">${item.c}</div>`;
    });

    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSU-bpcGNEsdx8LCiX7kkz4hVmn1AY0MoqjiXA4saZ9QYdKhCuzeN5qramsCIvYIpjMrM5nmaSvxg8V/pub?gid=0&single=true&output=csv';

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) return;

        try {
            const res = await fetch(SHEET_URL);
            const data = await res.text();
            const rows = data.split('\n').map(r => r.split(','));
            const user = rows.find(r => r[0] && r[0].trim() === id.trim());

            if (user) {
                document.getElementById('nombre-visual').innerText = user[1].trim();
                document.getElementById('btn-wa').href = 'https://wa.me/' + user[2].trim();
                document.getElementById('btn-tienda').href = user[3].trim();
                document.getElementById('btn-planner').href = user[3].trim();
                
                for(let i=0; i<5; i++) {
                    if(document.getElementById('f' + (i+1))) document.getElementById('f' + (i+1)).src = user[4+i].trim();
                    if(document.getElementById('t' + (i+1))) document.getElementById('t' + (i+1)).src = user[9+i].trim();
                }
            }
        } catch (e) { console.error("Error al cargar datos:", e); }
    }
    init();

    document.querySelectorAll('.accordion').forEach(acc => {
        acc.addEventListener('click', function() {
            this.classList.toggle("active");
            var panel = this.nextElementSibling;
            panel.style.maxHeight = panel.style.maxHeight ? null : panel.scrollHeight + "px";
        });
    });
</script>
</body>
</html>
