<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>Funnel Riman</title>
    <style>
        :root { --header-bg: #0f172a; --page-bg: #f1f5f9; --btn-green: #0fb396; --btn-gold: #d4af37; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: var(--page-bg); height: 100vh; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 700px; background: white; height: 100%; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header-premium { background-color: var(--header-bg); color: white; padding: 20px; text-align: center; }
        .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .btn-option { background: #f8fafc; border: 1px solid #cbd5e1; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: 600; text-align: center; text-decoration: none; color: #334155; display: flex; align-items: center; justify-content: center; }
        .btn-option:hover { background: var(--btn-green); color: white; }
        .btn-tienda { background: var(--btn-gold); color: white; border: none; }
        #chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 10px; max-width: 90%; }
        .bot-msg { background: #f8fafc; border: 1px solid #e2e8f0; align-self: flex-start; }
        .user-msg { background: var(--btn-green); color: white; align-self: flex-end; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header-premium">
        <h1 id="prod-name">Riman Academy</h1>
        <p>Bienestar y oportunidad para tu vida.</p>
    </div>
    <div class="button-grid" id="menu-oracion"></div>
    <div id="chat-history"><div class="msg bot-msg">Bienvenido, ¿qué deseas explorar hoy?</div></div>
</div>

<script>
    // 1. Obtener ID de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const idCapturado = urlParams.get('id'); 
    
    // 2. Base de datos
    const db = {
        "josehenriquez": { whatsapp: "56945491173", tienda: "https://mall.riman.com/ais21/products" }
    };

    const info = db[idCapturado] || { whatsapp: "56945491173", tienda: "https://mall.riman.com/ais21/products" };
    document.getElementById('prod-name').innerText = "Riman - " + (idCapturado ? idCapturado.charAt(0).toUpperCase() + idCapturado.slice(1) : "Bienvenido");

    // 3. Crear botones de categorías
    const opciones = ["❤️ Salud", "👨‍👩‍👧 Familia", "💼 Trabajo", "✝️ Fe y ánimo"];
    const grid = document.getElementById('menu-oracion');

    opciones.forEach(opcion => {
        const btn = document.createElement('button');
        btn.className = 'btn-option';
        btn.innerText = opcion;
        btn.onclick = () => enviarRespuesta(opcion);
        grid.appendChild(btn);
    });

    // 4. Botón WhatsApp Dinámico
    const linkWA = document.createElement('a');
    linkWA.href = `https://wa.me/${info.whatsapp}`;
    linkWA.target = "_blank";
    linkWA.className = 'btn-option';
    linkWA.innerText = "📤 Contacto WhatsApp";
    grid.appendChild(linkWA);

    // 5. Botón Tienda Dinámico
    const linkTienda = document.createElement('a');
    linkTienda.href = info.tienda;
    linkTienda.target = "_blank";
    linkTienda.className = 'btn-option btn-tienda';
    linkTienda.innerText = "🛍️ Ver Tienda Riman";
    grid.appendChild(linkTienda);

    function enviarRespuesta(opcion) {
        const history = document.getElementById('chat-history');
        history.innerHTML += `<div class="msg user-msg">${opcion}</div>`;
        history.innerHTML += `<div class="msg bot-msg">Has seleccionado: ${opcion}. Estamos para ayudarte.</div>`;
        history.scrollTop = history.scrollHeight;
    }
</script>
</body>
</html>
