<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funnel Riman Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f1f5f9; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 700px; background: white; padding-bottom: 20px; }
        
        .header { background: #0f172a; color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .header img { height: 45px; width: 45px; border-radius: 5px; object-fit: cover; }
        .header h1 { margin: 0; font-size: 20px; }
        
        .swiper { width: 100%; height: 200px; background: #ffffff; padding: 10px; box-sizing: border-box; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: contain; display: block; }
        
        .faq-section { padding: 15px; }
        .accordion { background: #334155; color: white; cursor: pointer; padding: 15px; width: 100%; border: none; text-align: left; border-radius: 8px; margin-bottom: 8px; font-weight: bold; }
        .panel { padding: 0 15px; background-color: #f8fafc; max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; border-left: 3px solid #334155; margin-bottom: 8px; }
        
        .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .btn-action { background: #334155; color: white; padding: 12px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: 600; font-size: 14px; }
        .btn-gold { background: #d4af37; }
        .btn-green { background: #0fb396; }
        .btn-diamond { background: #2563eb; grid-column: span 2; font-size: 16px; padding: 12px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <img src="logo.jpg" alt="Logo Riman">
        <h1 id="nombre-visual">Riman Academy</h1>
    </div>
    
    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="1.jpg" alt="Imagen 1" id="f1"></div>
            <div class="swiper-slide"><img src="2.jpg" alt="Imagen 2" id="f2"></div>
            <div class="swiper-slide"><img src="3.jpg" alt="Imagen 3" id="f3"></div>
            <div class="swiper-slide"><img src="4.jpg" alt="Imagen 4" id="f4"></div>
            <div class="swiper-slide"><img src="5.jpg" alt="Imagen 5" id="f5"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="faq-section">
        <button class="accordion">¿Qué es Riman?</button>
        <div class="panel"><p>Riman es una marca líder en belleza coreana con ciencia patentada.</p></div>
        <button class="accordion">¿Cómo genero ingresos?</button>
        <div class="panel"><p>Mediante la recomendación de productos. ¡Haz clic en WhatsApp!</p></div>
    </div>

    <div class="button-grid">
        <a id="btn-tienda" href="#" class="btn-action btn-gold">🛍️ Ver Tienda</a>
        <a id="btn-wa" href="#" class="btn-action btn-green">💬 WhatsApp</a>
        <a id="btn-planner" href="#" class="btn-action btn-diamond">¡Quiero ser Planner! 💎</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    // Inicialización del Carrusel
    const swiper = new Swiper('.swiper', { loop: true, autoplay: { delay: 3000 }, pagination: { el: '.swiper-pagination' } });

    // Lógica de carga de datos desde Google Sheets
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSU-bpcGNEsdx8LCiX7kkz4hVmn1AY0MoqjiXA4saZ9QYdKhCuzeN5qramsCIvYIpjMrM5nmaSvxg8V/pub?gid=0&single=true&output=csv'; 

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) return;

        const res = await fetch(SHEET_URL);
        const data = await res.text();
        const rows = data.split('\n').map(r => r.split(','));
        const user = rows.find(r => r[0].trim() === id.trim());

        if (user) {
            document.getElementById('nombre-visual').innerText = user[1];
            document.getElementById('btn-wa').href = 'https://wa.me/' + user[2];
            document.getElementById('btn-tienda').href = user[3];
            document.getElementById('btn-planner').href = user[3];
            
            // Cargar imágenes (Columnas E a I)
            for(let i=0; i<5; i++) {
                document.getElementById('f' + (i+1)).src = user[4+i];
            }
        }
    }
    init();

    // Lógica de Acordeones
    document.querySelectorAll('.accordion').forEach(acc => {
        acc.addEventListener('click', function() {
            var panel = this.nextElementSibling;
            panel.style.maxHeight = panel.style.maxHeight ? null : panel.scrollHeight + "px";
        });
    });
</script>
</body>
</html>
