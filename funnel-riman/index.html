<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funnel Riman Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f1f5f9; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 700px; background: white; padding-bottom: 20px; }
        .header { background: #0f172a; color: white; padding: 25px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; font-weight: bold; }
        
        .swiper { width: 100%; height: 250px; background: #ffffff; padding: 10px; box-sizing: border-box; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: contain; display: block; }
        
        /* Ajuste de testimonios con márgenes para que no se corten */
        .test-swiper { height: 280px; background: #f8fafc; padding: 20px; margin-top: 10px; }
        .test-swiper .swiper-slide img { object-fit: contain; padding: 15px; box-sizing: border-box; }
        
        .section-title { padding: 20px 15px 10px 15px; font-weight: bold; color: #1e293b; font-size: 18px; }
        
        .faq-section { padding: 15px; }
        .accordion { background: #334155; color: white; cursor: pointer; padding: 15px; width: 100%; border: none; text-align: left; border-radius: 8px; margin-bottom: 8px; font-weight: bold; }
        .panel { padding: 0 15px; background-color: #f8fafc; max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; border-left: 3px solid #334155; margin-bottom: 8px; }
        
        .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .btn-action { background: #334155; color: white; padding: 12px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: 600; font-size: 14px; }
        .btn-gold { background: #d4af37; }
        .btn-green { background: #0fb396; }
        .btn-diamond { background: #2563eb; grid-column: span 2; font-size: 16px; padding: 12px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h1 id="nombre-visual">Cargando...</h1>
    </div>
    
    <!-- Carrusel Principal -->
    <div class="swiper main-swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="" id="f1"></div>
            <div class="swiper-slide"><img src="" id="f2"></div>
            <div class="swiper-slide"><img src="" id="f3"></div>
            <div class="swiper-slide"><img src="" id="f4"></div>
            <div class="swiper-slide"><img src="" id="f5"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <!-- Carrusel de Testimonios -->
    <div class="section-title">Resultados Reales</div>
    <div class="swiper test-swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="" id="t1"></div>
            <div class="swiper-slide"><img src="" id="t2"></div>
            <div class="swiper-slide"><img src="" id="t3"></div>
            <div class="swiper-slide"><img src="" id="t4"></div>
            <div class="swiper-slide"><img src="" id="t5"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="faq-section">
        <button class="accordion">¿Qué es Riman?</button>
        <div class="panel"><p>Riman es la marca #1 de belleza coreana con ciencia patentada.</p></div>
    </div>

    <div class="button-grid">
        <a id="btn-tienda" href="#" class="btn-action btn-gold">🛍️ Ver Tienda</a>
        <a id="btn-wa" href="#" class="btn-action btn-green">💬 WhatsApp</a>
        <a id="btn-planner" href="#" class="btn-action btn-diamond">¡Quiero ser Planner! 💎</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    // Inicializar carruseles de forma independiente
    new Swiper('.main-swiper', { loop: true, autoplay: { delay: 3000 }, pagination: { el: '.swiper-pagination' } });
    new Swiper('.test-swiper', { loop: true, pagination: { el: '.swiper-pagination' } });

    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSU-bpcGNEsdx8LCiX7kkz4hVmn1AY0MoqjiXA4saZ9QYdKhCuzeN5qramsCIvYIpjMrM5nmaSvxg8V/pub?gid=0&single=true&output=csv';

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) return;

        try {
            const res = await fetch(SHEET_URL);
            const data = await res.text();
            const rows = data.split('\n').map(r => r.split(','));
            const user = rows.find(r => r[0] && r[0].trim() === id.trim());

            if (user) {
                document.getElementById('nombre-visual').innerText = user[1].trim();
                document.getElementById('btn-wa').href = 'https://wa.me/' + user[2].trim();
                document.getElementById('btn-tienda').href = user[3].trim();
                document.getElementById('btn-planner').href = user[3].trim();
                
                for(let i=0; i<5; i++) {
                    // Cargar imágenes principales e imágenes de testimonios
                    if(document.getElementById('f' + (i+1))) document.getElementById('f' + (i+1)).src = user[4+i].trim();
                    if(document.getElementById('t' + (i+1))) document.getElementById('t' + (i+1)).src = user[9+i].trim();
                }
            }
        } catch (e) { console.error("Error al cargar datos:", e); }
    }
    init();

    document.querySelectorAll('.accordion').forEach(acc => {
        acc.addEventListener('click', function() {
            var panel = this.nextElementSibling;
            panel.style.maxHeight = panel.style.maxHeight ? null : panel.scrollHeight + "px";
        });
    });
</script>
</body>
</html>
