<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>Funnel Riman</title>
    <style>
        :root { --header-bg: #0f172a; --btn-green: #0fb396; --btn-gold: #d4af37; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #f1f5f9; height: 100vh; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 700px; background: white; height: 100%; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header-premium { background-color: var(--header-bg); color: white; padding: 20px; text-align: center; }
        
        .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .btn-action { background: #f8fafc; border: 1px solid #cbd5e1; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: 600; text-align: center; text-decoration: none; color: #334155; display: flex; align-items: center; justify-content: center; }
        .btn-gold { background: var(--btn-gold); color: white; border: none; }
        .btn-green { background: var(--btn-green); color: white; border: none; }
        
        #chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-color: #f8fafc; }
        .msg { padding: 12px; border-radius: 10px; max-width: 90%; background: white; border: 1px solid #e2e8f0; align-self: flex-start; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header-premium">
        <h1 id="prod-name">Riman Academy</h1>
        <p>Bienestar y oportunidad para tu vida.</p>
    </div>
    
    <div class="button-grid" id="menu-acciones"></div>
    
    <div id="chat-history">
        <div class="msg">¡Hola! Bienvenido a Riman Academy. Por favor, <b>elige una de las opciones de arriba</b> para continuar con tu consulta o ver nuestro catálogo.</div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const idCapturado = urlParams.get('id'); 
    
    const db = {
        "josehenriquez": { whatsapp: "56945491173", tienda: "https://mall.riman.com/ais21/products" }
    };

    const info = db[idCapturado] || { whatsapp: "56945491173", tienda: "https://mall.riman.com/ais21/products" };
    document.getElementById('prod-name').innerText = "Riman - " + (idCapturado ? idCapturado.charAt(0).toUpperCase() + idCapturado.slice(1) : "Bienvenido");

    const grid = document.getElementById('menu-acciones');

    const botones = [
        { text: "🛍️ Ver Tienda", class: "btn-action btn-gold", href: info.tienda },
        { text: "💬 Hablar con asesor", class: "btn-action btn-green", href: `https://wa.me/${info.whatsapp}` }
    ];

    botones.forEach(b => {
        const btn = document.createElement('a');
        btn.className = b.class;
        btn.innerText = b.text;
        btn.href = b.href;
        btn.target = "_blank";
        grid.appendChild(btn);
    });
</script>
</body>
</html>
