<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funnel Riman</title>
    <!-- Importamos los estilos de Swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        :root { --header-bg: #0f172a; --btn-green: #0fb396; --btn-gold: #d4af37; --btn-info: #334155; }
        body { margin: 0; font-family: sans-serif; background: #f1f5f9; height: 100vh; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 700px; background: white; height: 100%; display: flex; flex-direction: column; }
        .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .btn-action { background: #f8fafc; border: 1px solid #cbd5e1; padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; color: #334155; font-weight: 600; text-decoration: none; }
        .btn-gold { background: var(--btn-gold); color: white; }
        
        /* Ajustes del carrusel en el chat */
        #chat-history { flex: 1; overflow-y: auto; padding: 20px; background: #f8fafc; }
        .swiper { width: 100%; height: 250px; border-radius: 10px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="chat-container">
    <div style="background: #0f172a; color: white; padding: 20px; text-align: center;"><h1>Riman Academy</h1></div>
    
    <div class="button-grid" id="menu-acciones">
        <button class="btn-action" onclick="mostrarCarrusel()">Ver Presentación 📸</button>
        <a href="#" class="btn-action btn-gold" id="btn-tienda" target="_blank">🛍️ Ver Tienda</a>
    </div>
    
    <div id="chat-history">
        <div class="msg" style="background:white; padding:10px; border-radius:10px;">¡Hola! Haz clic en "Ver Presentación" para navegar por nuestras imágenes.</div>
    </div>
</div>

<!-- Script de Swiper -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    // Tu lista de imágenes (deben estar en tu carpeta)
    const imagenes = ["1.png", "2.png", "3.png", "4.png", "5.png"];

    function mostrarCarrusel() {
        const history = document.getElementById('chat-history');
        let slides = imagenes.map(img => `<div class="swiper-slide"><img src="${img}"></div>`).join('');
        
        history.innerHTML += `
            <div class="swiper">
                <div class="swiper-wrapper">${slides}</div>
                <div class="swiper-pagination"></div>
            </div>`;

        new Swiper('.swiper', { pagination: { el: '.swiper-pagination' }, loop: true });
        history.scrollTop = history.scrollHeight;
    }
</script>
</body>
</html>
