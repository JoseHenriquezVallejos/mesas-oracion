<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Funnel Riman</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f1f5f9; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 700px; background: white; min-height: 100vh; }
        .header { background: #0f172a; color: white; padding: 20px; text-align: center; }
        
        .swiper { width: 100%; height: 350px; background: #000; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
        
        .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .btn-action { background: #334155; color: white; padding: 15px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: 600; }
        .btn-gold { background: #d4af37; }
        .btn-green { background: #0fb396; }
        .btn-diamond { background: #2563eb; grid-column: span 2; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header"><h1>Riman Academy</h1></div>
    
    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="1.jpg"></div>
            <div class="swiper-slide"><img src="2.jpg"></div>
            <div class="swiper-slide"><img src="3.jpg"></div>
            <div class="swiper-slide"><img src="4.jpg"></div>
            <div class="swiper-slide"><img src="5.jpg"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="button-grid">
        <a href="https://wa.me/56945491173" class="btn-action">🚀 Plataforma</a>
        <a href="https://wa.me/56945491173" class="btn-action">📈 Negocio Global</a>
        <a href="https://wa.me/56945491173" class="btn-action">💼 Conversión</a>
        <a href="https://wa.me/56945491173" class="btn-action">🤝 Aliado</a>
        <a href="https://mall.riman.com/ais21/products" class="btn-action btn-gold">🛍️ Ver Tienda</a>
        <a href="https://wa.me/56945491173" class="btn-action btn-green">💬 WhatsApp</a>
        <a href="https://mall.riman.com/ais21/products" class="btn-action btn-diamond">¡Quiero ser Planner! 💎</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    new Swiper('.swiper', {
        loop: true,
        autoplay: { delay: 3000, disableOnInteraction: false },
        pagination: { el: '.swiper-pagination' }
    });
</script>
</body>
</html>
