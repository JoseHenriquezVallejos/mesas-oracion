<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProverbiosAcademy</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .boton { width: 80%; max-width: 300px; padding: 20px; margin: 10px; text-align: center; text-decoration: none; border-radius: 12px; font-weight: bold; color: white; display: block; }
        .mesa { background-color: #4CAF50; }
        .wa { background-color: #25D366; }
    </style>
</head>
<body>
    <h1>¿Cómo deseas orar hoy?</h1>
    <a href="https://sites.google.com/view/mesa-de-oracion/inicio" class="boton mesa">Entrar a la Mesa de Oración</a>
    <a href="https://wa.me/56912345678" target="_top" class="boton wa">Enviar petición por WhatsApp</a>
</body>
</html>
