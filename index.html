<script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('i');
    const btn = document.getElementById('btn-wa');
    const URL_SCRIPT = "TU_URL_DE_GOOGLE_SCRIPT_AQUÍ";

    if (id) {
        fetch(URL_SCRIPT + "?i=" + id)
            .then(response => response.text())
            .then(telefono => {
                if (telefono !== "No encontrado") {
                    btn.href = "https://wa.me/" + telefono;
                } else {
                    btn.innerText = "Iglesia no registrada";
                }
            });
    }
</script>
