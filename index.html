<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bienvenido a tu Mesa de Oración</title>
</head>
<body>
    <h1>Bienvenido a la Mesa de Oración</h1>
    <a id="btn-wa" href="#" class="boton wa">Enviar petición por WhatsApp</a>

    <script>
        // Tu pequeña base de datos (puedes ir agregando aquí)
        const iglesias = {
            "iglesia01": "56912345678",
            "iglesia02": "56987654321"
        };

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('i'); // Obtiene el valor después de ?i=
        const btn = document.getElementById('btn-wa');

        if (id && iglesias[id]) {
            btn.href = "https://wa.me/" + iglesias[id];
        } else {
            btn.innerText = "Código de iglesia no válido";
            btn.href = "#";
        }
    </script>
</body>
</html>
