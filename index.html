<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mesa de Oración</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .boton {
            display: block;
            margin: 10px auto;
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            width: 250px;
        }
        .boton-wa { background-color: #25D366; }
        .boton-mesa { background-color: #007bff; } /* Color azul para mesa */
    </style>
</head>
<body>
    <h1>Bienvenido a la Mesa de Oración</h1>
    
    <!-- Botón 1: WhatsApp -->
    <a id="btn-wa" href="#" class="boton boton-wa">Cargando...</a>
    
    <!-- Botón 2: Nueva Mesa de Oración -->
    <a href="URL_DE_TU_MESA_AQUÍ" class="boton boton-mesa">Ir a la Mesa de Oración</a>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('i');
            const btn = document.getElementById('btn-wa');
            const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbx_BXbo1v_8Poz--oaDl9ud7jOXgex_yvwXYkkMp6g4FNltTHg2bLyfZZdFxQphmYkd/exec"; 

            if (id && btn) {
                fetch(URL_SCRIPT + "?i=" + id)
                    .then(r => r.text())
                    .then(telefono => {
                        if (telefono && telefono !== "No encontrado") {
                            btn.href = "https://wa.me/" + telefono;
                            btn.innerText = "Enviar petición por WhatsApp";
                        } else {
                            btn.innerText = "Iglesia no registrada";
                        }
                    });
            }
        };
    </script>
</body>
</html>
